name: Public Repo Guardrails

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run public repo guardrails
        shell: pwsh
        run: ./.github/scripts/public_repo_guardrails.ps1
